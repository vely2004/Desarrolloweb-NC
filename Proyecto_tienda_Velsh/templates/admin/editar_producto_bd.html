{% extends "base.html" %}

{% block content %}

<h2>Editar Producto</h2>

<form method="POST">

Nombre
<input type="text" name="nombre" value="{{ producto[1] }}">

Categoría
<input type="text" name="categoria" value="{{ producto[2] }}">

Talla
<input type="text" name="talla" value="{{ producto[3] }}">

Color
<input type="text" name="color" value="{{ producto[4] }}">

Precio
<input type="number" step="0.01" name="precio" value="{{ producto[5] }}">

Stock
<input type="number" name="stock" value="{{ producto[6] }}">

<button type="submit">Actualizar</button>

</form>

{% endblock %}
