{% extends "base.html" %}

{% block title %}Agregar Producto{% endblock %}

{% block content %}

<div class="form-section mx-auto" style="max-width:600px;">


    <h2 class="text-center mb-4">Agregar Producto</h2>

    <form method="POST" enctype="multipart/form-data">

        <!-- Nombre -->
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-control" required>
        </div>

        <!-- Categoría -->
        <div class="mb-3">
            <label for="categoria" class="form-label">Categoría</label>
            <input type="text" id="categoria" name="categoria" class="form-control" required>
        </div>

        <!-- Talla -->
        <div class="mb-3">
            <label for="talla" class="form-label">Talla</label>
            <input type="text" id="talla" name="talla" class="form-control">
        </div>

        <!-- Color -->
        <div class="mb-3">
            <label for="color" class="form-label">Color</label>
            <input type="text" id="color" name="color" class="form-control">
        </div>

        <!-- Precio -->
        <div class="mb-3">
            <label for="precio" class="form-label">Precio</label>
            <input type="number" id="precio" name="precio" class="form-control" step="0.01" required>
        </div>

        <!-- Stock -->
        <div class="mb-3">
            <label for="stock" class="form-label">Stock</label>
            <input type="number" id="stock" name="stock" class="form-control" required>
        </div>

        <!-- Imagen de referencia -->
        <div class="mb-3">
            <label for="imagen" class="form-label">Imagen</label>
            <input type="file" id="imagen" name="imagen" class="form-control">
        </div>

        <!-- Guardar producto -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5">Guardar Producto</button>
        </div>

    </form>
</div>

{% endblock %}
