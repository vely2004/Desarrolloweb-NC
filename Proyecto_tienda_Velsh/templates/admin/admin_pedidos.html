{% extends "base.html" %}

{% block title %}Datos de Pedidos{% endblock %}

{% block content %}
<h2>Datos de Pedidos</h2>

<table border="1">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Email</th>
<th>Celular</th>
<th>Dirección</th>
<th>Producto</th>
<th>Acciones</th>
</tr>

{% for p in pedidos %}

<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>{{ p[4] }}</td>
<td>{{ p[5] }}</td>

<td>
<a href="{{ url_for('editar_pedido', id_pedido=p[0]) }}">Editar</a> |
<a href="{{ url_for('eliminar_pedido', id_pedido=p[0]) }}"
onclick="return confirm('¿Estás seguro de eliminar este pedido?')">
Eliminar
</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
