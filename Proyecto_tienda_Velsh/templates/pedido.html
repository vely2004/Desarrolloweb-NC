{% extends 'base.html' %}

{% block title %}Pedido{% endblock %}

{% block content %}

<div class="form-section">
    <h2 class="text-center mb-4">Pedido</h2>

    <form method="POST" action="{{ url_for('pedido') }}">

        <!-- Nombre -->
        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@email.com" required>
        </div>

        <!-- Número celular -->
        <div class="mb-3">
            <label for="celular" class="form-label">Número de celular</label>
            <input type="tel" class="form-control" id="celular" name="celular" placeholder="Ejemplo: 123456789" required>
        </div>

        <!-- Dirección -->
        <div class="mb-3">
            <label for="direccion" class="form-label">Dirección de entrega</label>
            <input type="text" class="form-control" id="direccion" name="direccion" placeholder="Ejemplo: Calle Bolívar y Sucre" required>
        </div>

        <p class="text-muted small">
            <em>La entrega del pedido se realiza de forma personal en la dirección indicada.</em>
        </p>

        <!-- Producto -->
        <div class="mb-4">
            <label for="producto" class="form-label">Producto que desea</label>
            <textarea class="form-control" id="producto" name="producto" rows="3" placeholder="Ejemplo: Botas negras talla 38" required></textarea>
        </div>

        <div class="alert alert-warning text-center">
            <strong>Forma de pago:</strong> El pago se realiza al momento de la entrega del pedido.
        </div>

        <!-- Botón -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary px-5">Enviar</button>
        </div>

    </form>
</div>

{% endblock %}
