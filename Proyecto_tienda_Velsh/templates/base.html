<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Tienda Online Velsh</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header>
    <h1>Tienda Online Velsh</h1>
    <nav>
        <a href="{{ url_for('inicio') }}">Inicio</a>
        <a href="{{ url_for('categoria', tipo='deportivos') }}">Deportivos</a>
        <a href="{{ url_for('categoria', tipo='elegantes') }}">Elegantes</a>
        <a href="{{ url_for('categoria', tipo='botas') }}">Botas</a>
        <a href="{{ url_for('categoria', tipo='mocasines') }}">Mocasines</a>
        <a href="{{ url_for('pedido') }}">Pedido</a>
        <a href="{{ url_for('contacto') }}">Contacto</a>
        <a href="{{ url_for('about') }}">Acerca de</a>
    </nav>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<footer>
    <p>© 2026 Tienda Velsh - Calzado Femenino exclusivo y moderno</p>
</footer>

<!-- Script de Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
